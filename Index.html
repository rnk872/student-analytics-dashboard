# student-analytics-dashboard
modern React-based student analytics dashboard with search, filtering, and dynamic data visualization.
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Analytics Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f4f4;
    }

    header {
      background: #1e293b;
      color: white;
      padding: 15px;
      text-align: center;
    }

    .container {
      padding: 20px;
    }

    input {
      padding: 10px;
      width: 100%;
      margin-bottom: 20px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 15px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      transition: 0.2s;
    }

    .card:hover {
      transform: scale(1.03);
    }

    .slides {
      display: flex;
      overflow-x: auto;
      gap: 15px;
      margin-top: 30px;
    }

    .slide {
      min-width: 200px;
      padding: 20px;
      border-radius: 12px;
      color: white;
    }

    .blue { background: #3b82f6; }
    .green { background: #22c55e; }
    .purple { background: #a855f7; }
    .red { background: #ef4444; }

  </style>
</head>

<body>

<header>
  <h1>Student Analytics Dashboard</h1>
</header>

<div class="container">

  <input type="text" id="search" placeholder="Search student...">

  <div class="cards" id="cards"></div>

  <div class="slides">
    <div class="slide blue" id="total"></div>
    <div class="slide green" id="class11"></div>
    <div class="slide purple" id="class12"></div>
    <div class="slide red" id="topper"></div>
  </div>

</div>

<script>
  const students = [];

  for (let i = 1; i <= 120; i++) {
    students.push({
      name: "Student " + i,
      class: i % 2 === 0 ? "11" : "12",
      marks: Math.floor(60 + Math.random() * 40)
    });
  }

  const cardsContainer = document.getElementById("cards");
  const searchInput = document.getElementById("search");

  function render(data) {
    cardsContainer.innerHTML = "";
    data.forEach(s => {
      cardsContainer.innerHTML += `
        <div class="card">
          <h3>${s.name}</h3>
          <p>Class: ${s.class}</p>
          <p>Marks: ${s.marks}</p>
        </div>
      `;
    });
  }

  searchInput.addEventListener("input", () => {
    const value = searchInput.value.toLowerCase();
    const filtered = students.filter(s =>
      s.name.toLowerCase().includes(value)
    );
    render(filtered);
  });

  // Analytics
